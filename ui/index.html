<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рандомный Донат</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/spwmini-sdk@latest/dist/index.js"></script>
    <style>
        body { background-color: #0b0c10; color: #f5f5f5; font-family: ui-sans-serif, system-ui, -apple-system; }
        .card { background-color: #16171e; border: 1px solid #22252e; }
        .input { background-color: #0f1015; border: 1px solid #22252e; }
        .input:focus { border-color: #4f46e5; outline: none; }
        .btn-active { background-color: #22252e; color: #ffffff; }
        .btn-inactive { color: #9ca3af; }
        .btn-inactive:hover { background-color: #1c1e26; color: #ffffff; }
    </style>
</head>
<body class="p-4 sm:p-6 min-h-screen flex flex-col items-center justify-start">

    <div class="w-full max-w-2xl flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-bold tracking-tight">Рандомный Донат</h1>
            <p class="text-xs text-gray-400">СПм / СПв</p>
        </div>
        <div class="flex items-center gap-3">
            <span id="player-name" class="text-sm font-medium text-gray-300">Авторизация...</span>
            <img id="player-avatar" src="https://minotar.net/helm/Steve/64.png" alt="Avatar" class="w-10 h-10 rounded shadow-md border border-gray-700">
        </div>
    </div>

    <div class="w-full max-w-2xl card rounded-2xl p-6 sm:p-8 shadow-xl">
        
        <div class="flex gap-2 mb-6 border-b border-gray-800 pb-4">
            <button id="tab-transfer" onclick="switchTab('transfer')" class="px-4 py-2 rounded-lg text-sm font-medium transition btn-active">
                Перевод
            </button>
            <button id="tab-history" onclick="switchTab('history')" class="px-4 py-2 rounded-lg text-sm font-medium transition btn-inactive">
                История
            </button>
        </div>

        <div id="page-transfer" class="space-y-5">
            <h2 class="text-2xl font-bold mb-2">Перевести АРы случайному игроку в онлайне</h2>
            
            <div id="transfer-form">
                <div class="flex flex-col gap-1.5 mb-4">
                    <label class="text-sm font-medium text-gray-300">Количество (АР)</label>
                    <input type="number" id="amount" min="1" placeholder="Например: 16" class="w-full input rounded-xl px-4 py-3 text-white">
                </div>

                <div class="flex flex-col gap-1.5 mb-4">
                    <label class="text-sm font-medium text-gray-300">Комментарий</label>
                    <input type="text" id="comment" placeholder="Удачи в игре! 🎉" class="w-full input rounded-xl px-4 py-3 text-white">
                </div>

                <div class="flex items-center gap-3 py-2 mb-4">
                    <input type="checkbox" id="anonymous" class="w-5 h-5 rounded input accent-indigo-600 cursor-pointer">
                    <label for="anonymous" class="text-sm font-medium text-gray-300 cursor-pointer select-none">Отправить анонимно</label>
                </div>

                <button onclick="handleCreateTransfer()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3.5 px-4 rounded-xl transition shadow-lg active:scale-[0.99]">
                    Инициализировать перевод
                </button>
            </div>

            <div id="selection-form" class="hidden p-4 bg-[#0f1015] border border-gray-800 rounded-xl space-y-4">
                <h3 class="text-lg font-semibold text-indigo-400">Перевод оплачен! Выберите получателя:</h3>
                <p class="text-xs text-gray-400">Бэкенд ожидает подтверждения получателя и карты.</p>
                
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-300">Ник получателя (Рандомный активный игрок)</label>
                    <input type="text" id="receiver-nick" placeholder="Имя игрока" class="w-full input rounded-xl px-4 py-2 text-white">
                </div>
                
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-300">Номер карты получателя</label>
                    <input type="text" id="receiver-card" placeholder="00000" class="w-full input rounded-xl px-4 py-2 text-white">
                </div>

                <button onclick="handleConfirmSelection()" class="w-full bg-green-600 hover:bg-green-500 text-white font-medium py-2 rounded-lg transition text-sm">
                    Подтвердить и отправить
                </button>
            </div>

            <div class="mt-6 pt-4 border-t border-gray-800 flex items-center justify-between text-xs text-gray-400">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span>Онлайн: <strong class="text-gray-200">110 Акт.</strong></span>
                </div>
            </div>
        </div>

        <div id="page-history" class="hidden space-y-4">
            <h2 class="text-2xl font-bold mb-2">История ваших раздач</h2>
            <div class="overflow-hidden rounded-xl border border-gray-800">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[#0f1015] text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-800">
                            <th class="p-4">ID Перевода</th>
                            <th class="p-4">Сумма</th>
                            <th class="p-4">Статус</th>
                        </tr>
                    </thead>
                    <tbody id="history-rows" class="text-sm divide-y divide-gray-800">
                        <tr><td class="p-4 text-gray-500 text-center" colspan="3">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const spw = new SpwMini();
        let jwtToken = "";
        let currentTransferId = ""; 
        let userNickname = "";

        // POST /auth/init
        async function initAuth() {
            try {
                const userData = await spw.getUserData();
                userNickname = userData.username;
                
                document.getElementById('player-name').innerText = userNickname;
                document.getElementById('player-avatar').src = `https://minotar.net/helm/${userNickname}/64.png`;

                const response = await fetch('/auth/init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (!response.ok) throw new Error("Ошибка аутентификации бэкенда");
                
                const data = await response.json();
                jwtToken = data.token;
            } catch (err) {
                console.error(err);
                document.getElementById('player-name').innerText = "Ошибка авторизации";
            }
        }

        async function authorizedFetch(url, options = {}) {
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${jwtToken}`,
                'Content-Type': 'application/json'
            };
            return fetch(url, options);
        }

        // POST /transfer
        async function handleCreateTransfer() {
            if (!jwtToken) return alert("Вы не авторизованы");

            const amount = parseInt(document.getElementById('amount').value);
            const commentVal = document.getElementById('comment').value;
            const comment = commentVal ? commentVal : null;
            const anonymous = document.getElementById('anonymous').checked;

            if (!amount || amount <= 0) return alert("Введите корректную сумму");

            try {
                const response = await authorizedFetch('/transfer', {
                    method: 'POST',
                    body: JSON.stringify({ sender: userNickname, amount, comment, anonymous })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.message || "Ошибка при создании перевода");
                }

                const transfer = await response.json();
                currentTransferId = transfer.id; 
                

                // редирект на код итд
                document.getElementById('transfer-form').classList.add('hidden');
                document.getElementById('selection-form').classList.remove('hidden');
            } catch (err) {
                alert(err.message);
            }
        }

        // POST /transfer/{id}/select
        async function handleConfirmSelection() {
            if (!currentTransferId) return alert("Нет активного ID перевода");

            const receiver = document.getElementById('receiver-nick').value;
            const card = document.getElementById('receiver-card').value;

            if (!receiver || !card) return alert("Заполните поля получателя");

            try {
                const response = await authorizedFetch(`/transfer/${currentTransferId}/select`, {
                    method: 'POST',
                    body: JSON.stringify({ receiver, card })
                });

                if (!response.ok) throw new Error("Не удалось подтвердить выбор");

                // reset form
                document.getElementById('transfer-form').classList.remove('hidden');
                document.getElementById('selection-form').classList.add('hidden');
                document.getElementById('amount').value = '';
                document.getElementById('comment').value = '';
            } catch (err) {
                alert(err.message);
            }
        }

        // GET /transfers/@me
        async function loadHistory() {
            if (!jwtToken) return;
            const tbody = document.getElementById('history-rows');

            try {
                const response = await authorizedFetch('/transfers/@me');
                if (!response.ok) throw new Error();
                
                const transfers = await response.json();

                if (transfers.length === 0) {
                    tbody.innerHTML = `<tr><td class="p-4 text-center text-gray-500" colspan="3">История пуста</td></tr>`;
                    return;
                }

                tbody.innerHTML = transfers.map(t => `
                    <tr class="hover:bg-[#1c1e26] transition border-b border-gray-800">
                        <td class="p-4 text-gray-400 font-mono text-xs">${t.id || '—'}</td>
                        <td class="p-4 text-green-400 font-semibold">${t.amount} АР</td>
                        <td class="p-4"><span class="px-2 py-1 rounded text-xs bg-gray-800 text-gray-300">Создан</span></td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td class="p-4 text-center text-red-400" colspan="3">Ошибка загрузки данных</td></tr>`;
            }
        }

        function switchTab(tab) {
            const pageTransfer = document.getElementById('page-transfer');
            const pageHistory = document.getElementById('page-history');
            const btnTransfer = document.getElementById('tab-transfer');
            const btnHistory = document.getElementById('tab-history');

            if (tab === 'transfer') {
                pageTransfer.classList.remove('hidden');
                pageHistory.classList.add('hidden');
                btnTransfer.className = "px-4 py-2 rounded-lg text-sm font-medium transition btn-active";
                btnHistory.className = "px-4 py-2 rounded-lg text-sm font-medium transition btn-inactive";
            } else {
                pageTransfer.classList.add('hidden');
                pageHistory.classList.remove('hidden');
                btnTransfer.className = "px-4 py-2 rounded-lg text-sm font-medium transition btn-inactive";
                btnHistory.className = "px-4 py-2 rounded-lg text-sm font-medium transition btn-active";
                loadHistory();
            }
        }

        initAuth();
    </script>
</body>
</html>
