<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>randomly</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0c10; color: #f5f5f5; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .spw-card { background-color: #16171e; border: 1px solid #22252e; }
        .spw-input { background-color: #0f1015; border: 1px solid #22252e; }
        .spw-input:focus { border-color: #4f46e5; outline: none; }
        .spw-btn-active { background-color: #22252e; color: #ffffff; }
        .spw-btn-inactive { color: #9ca3af; }
        .spw-btn-inactive:hover { background-color: #1c1e26; color: #ffffff; }
    </style>
</head>
<body class="p-4 sm:p-6 min-h-screen flex flex-col items-center justify-start">

    <div class="w-full max-w-2xl flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-bold tracking-tight">Randomly</h1>
            <p class="text-xs text-gray-400">СПм / СПв</p>
        </div>
        <div class="flex items-center gap-3">
            <span id="player-name" class="text-sm font-medium text-gray-300">Режим без SDK</span>
            <img id="player-avatar" src="https://minotar.net/helm/Steve/64.png" alt="Avatar" class="w-10 h-10 rounded shadow-md border border-gray-700">
        </div>
    </div>

    <div class="w-full max-w-2xl spw-card rounded-2xl p-6 sm:p-8 shadow-xl">
        
        <div class="flex gap-2 mb-6 border-b border-gray-800 pb-4">
            <button id="tab-transfer" onclick="switchTab('transfer')" class="px-4 py-2 rounded-lg text-sm font-medium transition spw-btn-active">
                Перевод
            </button>
            <button id="tab-history" onclick="switchTab('history')" class="px-4 py-2 rounded-lg text-sm font-medium transition spw-btn-inactive">
                История
            </button>
        </div>

        <div id="page-transfer" class="space-y-5">
            <h2 class="text-2xl font-bold mb-2">Отправить АРа случайному игроку</h2>
            
            <div id="transfer-form">
                <div class="flex flex-col gap-1.5 mb-4">
                    <label class="text-sm font-medium text-gray-300">Количество (АР)</label>
                    <input type="number" id="amount" min="1" placeholder="Например: 16" class="w-full spw-input rounded-xl px-4 py-3 text-white">
                </div>

                <div class="flex flex-col gap-1.5 mb-4">
                    <label class="text-sm font-medium text-gray-300">Комментарий</label>
                    <input type="text" id="comment" placeholder="Удачи в игре! 🎉" class="w-full spw-input rounded-xl px-4 py-3 text-white">
                </div>

                <div class="flex items-center gap-3 py-2 mb-4">
                    <input type="checkbox" id="anonymous" class="w-5 h-5 rounded spw-input accent-indigo-600 cursor-pointer">
                    <label for="anonymous" class="text-sm font-medium text-gray-300 cursor-pointer select-none">Отправить анонимно</label>
                </div>

                <button class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3.5 px-4 rounded-xl transition shadow-lg">
                    Инициализировать перевод
                </button>
            </div>

            <div class="mt-6 pt-4 border-t border-gray-800 flex items-center justify-between text-xs text-gray-400">
                <div class="flex items-center gap-2">
                    <span>Онлайн: <strong id="online-count" class="text-gray-200">110</strong></span>
                    <button onclick="refreshOnline()" class="p-1 hover:bg-gray-800 rounded transition text-sm text-indigo-400" title="Проверить связь с сервером">
                        ↻
                    </button>
                    <span id="health-status" class="ml-2 text-[10px] uppercase font-bold tracking-wider"></span>
                </div>
            </div>
        </div>

        <div id="page-history" class="hidden p-4 text-center text-gray-500">
            Раздел истории
        </div>

    </div>

    <script>
        const BASE_URL = "http://localhost:8080";

        

        async function refreshOnline() {
            const onlineEl = document.getElementById('online-count');
            const syncButton = document.querySelector('button[title="Обновить"]');
            
            if (syncButton) syncButton.classList.add('animate-spin'); 

            try {
                const response = await fetch(`${BASE_URL}/data/online`, {
                    method: 'GET'
                });

                if (!response.ok) throw new Error("Ошибка сервера");

                const data = await response.json();
                
                onlineEl.innerText = data.count;
            } catch (err) {
                console.error("Не удалось обновить онлайн:", err);
                onlineEl.innerText = "???"; 
            } finally {
                if (syncButton) {
                    setTimeout(() => syncButton.classList.remove('animate-spin'), 300);
                }
            }
        }

        function switchTab(tab) {
            const pageTransfer = document.getElementById('page-transfer');
            const pageHistory = document.getElementById('page-history');
            const btnTransfer = document.getElementById('tab-transfer');
            const btnHistory = document.getElementById('tab-history');

            if (tab === 'transfer') {
                pageTransfer.classList.remove('hidden');
                pageHistory.classList.add('hidden');
                btnTransfer.className = "px-4 py-2 rounded-lg text-sm font-medium transition spw-btn-active";
                btnHistory.className = "px-4 py-2 rounded-lg text-sm font-medium transition spw-btn-inactive";
            } else {
                pageTransfer.classList.add('hidden');
                pageHistory.classList.remove('hidden');
                btnTransfer.className = "px-4 py-2 rounded-lg text-sm font-medium transition spw-btn-inactive";
                btnHistory.className = "px-4 py-2 rounded-lg text-sm font-medium transition spw-btn-active";
            }
        }

        window.addEventListener('DOMContentLoaded', checkBackendHealth);
        window.addEventListener('DOMContentLoaded', refreshOnline);
    </script>
</body>
</html>
